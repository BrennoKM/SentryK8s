apiVersion: v1
kind: Secret
metadata:
  name: prometheus-community-helm-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: helm
  name: prometheus-community
  url: https://prometheus-community.github.io/helm-charts

---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.2.0
    chart: kube-prometheus-stack
    helm:
      values: |
        installCRDs: true
        
        grafana:
          enabled: false
        alertmanager:
          enabled: false
        prometheus-node-exporter:
          enabled: false
        kube-state-metrics:
          enabled: false

        prometheus:
          enabled: true
          persistence:
            enabled: false
          
          prometheusSpec:
            additionalScrapeConfigs:
              - job_name: 'rabbitmq-static' # Nome diferente para evitar problemas de cache
                
                static_configs:
                  - targets: ['sentryk8s-dev-rabbitmq.sentryk8s-dev.svc.cluster.local:15692']
                scrape_timeout: 30s
                basic_auth:
                  username: "admin"
                  password: "sentryk8s"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true